services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Only persist the database file — not the whole folder.
      # This avoids permission issues while keeping data across restarts.
      - db_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/devmap.db
    networks:
      - techmap

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - INTERNAL_API_URL=http://backend:8000
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - techmap

networks:
  techmap:
    driver: bridge

volumes:
  db_data:
